name: EREA — Coletor de Notícias

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install feedparser requests

      - name: Executar coletor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python coletor.py

      - name: Salvar news_data.json no repositório
        run: |
          git config user.name  "EREA Bot"
          git config user.email "bot@erea-portal"
          git add news_data.json
          git diff --staged --quiet || git commit -m "chore: atualiza notícias $(date +'%d/%m/%Y %H:%M')"
          git push
