name: EREA — Coletor de Notícias

on:
  workflow_dispatch:        # mantém o botão "Run workflow" manual
  schedule:
    - cron: '0 9 * * *'    # 06:00 horário de Brasília (UTC-3 = 09:00 UTC)

jobs:
  coletar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install feedparser requests

      - name: Executar coletor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python coletor.py

      - name: Commit e push do news_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news_data.json
          git diff --cached --quiet || git commit -m "chore: atualização automática de notícias [$(date +'%d/%m/%Y %H:%M')]"
          git push
